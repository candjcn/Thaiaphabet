name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBOCdtQzdU0o4zj_wzAJjGnItgJCJsOuS0
          VITE_FIREBASE_AUTH_DOMAIN: thaiaphabet.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: thaiaphabet
          VITE_FIREBASE_STORAGE_BUCKET: thaiaphabet.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "171278666463"
          VITE_FIREBASE_APP_ID: "1:171278666463:web:87efd9c940d2e609faf76a"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
